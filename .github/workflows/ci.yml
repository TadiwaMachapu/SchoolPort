name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast governance gate: the STEP 4 endpoint-authorization contract. Pure reflection, no
  # database, no Docker — so it runs in seconds and blocks every PR. A new endpoint with no
  # [RequirePermission]/[AllowAnonymous] fails this job and therefore the build.
  architecture:
    name: Architecture contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore SchoolPortal.sln
      - name: Run architecture tests
        run: dotnet test SchoolPortal.Tests/SchoolPortal.Tests.csproj
          --filter "Category=Architecture"
          --logger "console;verbosity=normal"

  # Build + the database-backed and unit suites against a real Postgres (the in-memory provider
  # cannot map the jsonb POCO columns). The three legacy in-memory test classes
  # (AssignmentServiceTests, AttendanceServiceTests, AssignmentEndpointTests) are excluded until
  # Sprint 1.5.0 Step 10 converts them to the Postgres fixture; remove the filter then.
  backend:
    name: Backend build + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolport_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_PG_CONNECTION: "Host=localhost;Port=5432;Database=schoolport_test;Username=postgres;Password=postgres"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore SchoolPortal.sln
      - name: Build
        run: dotnet build SchoolPortal.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test SchoolPortal.sln --configuration Release --no-build
          --logger "console;verbosity=normal"

  # Proves the EF migration chain replays cleanly from an EMPTY database to head — i.e. a fresh
  # clone can build the schema from migrations alone (no EnsureCreated). Guards the orphan-history
  # gaps (super_admins) that previously broke from-scratch replay. Uses the design-time factory so
  # `dotnet ef` does not boot the API host (whose startup would migrate/seed).
  migrate-replay:
    name: Migration replay (fresh DB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolport_migrate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      EF_MIGRATIONS_CONNECTION: "Host=localhost;Port=5432;Database=schoolport_migrate;Username=postgres;Password=postgres"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 8.0.4
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Restore
        run: dotnet restore SchoolPortal.sln
      - name: Replay migrations from empty -> head
        run: dotnet ef database update --project SchoolPortal.Data --startup-project SchoolPortal.Server --verbose
      - name: Assert schema built from migrations (super_admins exists, history at head)
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d schoolport_migrate -c "SELECT to_regclass('public.super_admins') IS NOT NULL AS super_admins_exists;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d schoolport_migrate -c "SELECT count(*) AS applied_migrations FROM \"__EFMigrationsHistory\";"

  # Catches a broken frontend build on every PR (the .NET side is covered above).
  web:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: schoolportal-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: schoolportal-web/yarn.lock
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Build
        run: yarn build
